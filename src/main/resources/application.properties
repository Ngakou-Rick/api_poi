spring.application.name=yow_point

# R2DBC PostgreSQL Configuration
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/yow_point
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10

# To see R2DBC queries (optional, can be verbose)
# logging.level.io.r2dbc.postgresql.QUERY=DEBUG
# logging.level.io.r2dbc.postgresql.PARAM=DEBUG
# logging.level.org.springframework.r2dbc=DEBUG

# Schema initialization (if using schema.sql, not ddl-auto)
# spring.r2dbc.initialization-mode=always
# Ensure you have a schema.sql in src/main/resources or configure Flyway/Liquibase
# For now, we assume the schema from poi.sql is already in the database or managed externally.
